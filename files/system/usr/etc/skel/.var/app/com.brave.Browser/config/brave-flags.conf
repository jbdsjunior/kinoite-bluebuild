# --- Wayland & Display Integration ---
--ozone-platform-hint=wayland
--enable-features=WaylandWindowDecorations

# --- GPU Acceleration & Video Decoding (AMD RX 6600 XT / Mesa) ---
--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy
--disable-features=Vulkan
--enable-features=VaapiVideoDecoder,VaapiVideoEncoder,CanvasOopRasterization,VaapiIgnoreDriverChecks,UseMultiPlaneFormatForHardwareVideo

# --- Privacy, Debloat & Telemetry ---
--disable-breakpad
--no-pings
--disable-domain-reliability
--disable-component-update
