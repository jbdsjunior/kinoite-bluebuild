# KVM/Libvirt and GNOME Boxes User VM Images
# Enable nocow (copy-on-write disable) for VM disk images to reduce fragmentation
d %h/.local/share/libvirt/images 0755 - - -
h %h/.local/share/libvirt/images - - - - +C
d %h/.local/share/gnome-boxes/images 0755 - - -
h %h/.local/share/gnome-boxes/images - - - - +C

# User container volumes (Podman/Distrobox)
# Apply nocow to container volumes for better I/O performance
d %h/.local/share/containers/storage/volumes 0700 - - -
h %h/.local/share/containers/storage/volumes - - - - +C

# Rclone VFS Cache (Prevents severe fragmentation from chunked cloud syncing)
d %h/.cache/rclone 0755 - - -
h %h/.cache/rclone - - - - +C

d %h/.var/app/com.brave.Browser/cache 0700 - - -
h %h/.var/app/com.brave.Browser/cache - - - - +C
d %h/.var/app/com.google.Chrome/cache 0700 - - -
h %h/.var/app/com.google.Chrome/cache - - - - +C

# General Downloads (Torrents, ISOs, and large media files)
d %h/Downloads 0755 - - -
h %h/Downloads - - - - +C

# P2P Downloads / qBittorrent (Non-linear file chunk allocations)
# d %h/Downloads/torrents 0755 - - -
# h %h/Downloads/torrents - - - - +C

# Local LLM Vector Databases (Example path for tools like ChromaDB)
d %h/.local/share/chroma 0755 - - -
h %h/.local/share/chroma - - - - +C

# Local LLM Models and Vector Databases (Ollama, LM Studio, ChromaDB)
# Ollama models directory
d %h/.ollama 0755 - - -
h %h/.ollama - - - - +C

# LM Studio cache and data directories
d %h/.cache/lm-studio 0755 - - -
h %h/.cache/lm-studio - - - - +C

d %h/.lmstudio 0755 - - -
h %h/.lmstudio - - - - +C
