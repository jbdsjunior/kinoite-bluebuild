# Dracut initramfs configuration for Fedora Kinoite
# Compression: zstd provides best balance of speed and size reduction (~30-40% vs gzip)
compress="zstd"

# Enable early microcode updates for CPU stability and security patches
# Critical for AMD Ryzen systems (mitigates speculative execution vulnerabilities)
early_microcode="yes"

# Generic mode required for ostree/bare-metal deployments
# Allows same image to boot on diverse hardware without initramfs rebuild
hostonly="no"
hostonly_cmdline="no"

# Timeout tuned for NVMe Gen4 SSDs (fast device initialization)
# Default is 60s; 15s sufficient for modern NVMe while allowing margin for slow devices
timeout="15"
