# Dracut initramfs configuration
compress="zstd"

# Omit legacy/unneeded hardware modules for modern workstation
omit_dracutmodules+=" lvm mdraid btrfs-overlayfs "

# Enable microcode updates early in boot
early_microcode="yes"

# Reduce timeout for device initialization (NVMe is fast)
timeout="30"

# Use generic mode for OCI/OSTree images (required for bare-metal deployment)
hostonly="no"
hostonly_cmdline="no"
