# Dracut initramfs configuration
compress="zstd"

# Omit legacy/unneeded hardware modules for modern workstation
omit_dracutmodules+=" lvm mdraid btrfs-overlayfs "

# Force early KMS for faster graphical boot (AMD/NVIDIA)
add_drivers+=" amdgpu nvidia nvidia-modeset nvidia-drm "

# Enable microcode updates early in boot
early_microcode="yes"

# Reduce timeout for device initialization (NVMe is fast)
timeout="30"

# Use hostonly mode for smaller initramfs (requires regeneration on hardware change)
hostonly="yes"
hostonly_cmdline="no"
