# /usr/lib/sysctl.d/60-kernel-tuning.conf

# --- VIRTUAL MEMORY & I/O ---
# Required for Brave (Chromium) multi-tab isolation and LLM execution
vm.max_map_count = 16777216

# NVMe Write Pacing: Flush P2P chunks dynamically to prevent I/O stalls on 64GB RAM
vm.dirty_background_bytes = 134217728
vm.dirty_bytes = 536870912

# --- NETWORK: TCP BBR & VIRTUALIZATION ---
# BBR + FQ enforces optimal pacing for video streaming and low latency
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Loose reverse path filtering for podman/distrobox compatibility
net.ipv4.conf.all.rp_filter = 2
net.ipv4.tcp_mtu_probing = 1

# --- NETWORK: HIGH CONCURRENCY (P2P & Heavy Browsing) ---
# Expand ephemeral ports for massive concurrent P2P/WebRTC connections
net.ipv4.ip_local_port_range = 1024 65535
# Aggressively recycle sockets to prevent port exhaustion
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
# Reduce TLS/TCP handshake latency for video CDN requests
net.ipv4.tcp_fastopen = 3
# Prevent connection tracking tables from dropping packets during torrent seeding
net.netfilter.nf_conntrack_max = 1048576

# --- NETWORK: THROUGHPUT BUFFERS ---
# 16MB max buffers for sustained high-bandwidth downloads and 4K/8K video buffers
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# --- SYSTEM LIMITS ---
# Global file descriptor limits for Torrents + Electron/Web engines
fs.file-max = 2097152
# Inotify limits for IDEs and broad filesystem watchers
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576

# --- SECURITY ---
# Kernel logging and pointer restrictions
kernel.yama.ptrace_scope = 1
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1
