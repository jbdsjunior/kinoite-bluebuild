# --- MEMORY, SWAP & I/O OPTIMIZATIONS ---
# Disable zswap clustering for lower latency (SSD/NVMe systems)
vm.page-cluster = 0
# Scale watermarks for high-throughput workloads
vm.watermark_scale_factor = 125

# Dirty page writeback thresholds using ratios for kernel resilience
# Ratios scale automatically across RAM configurations (64GB baseline)
# ~1GB background, ~4GB blocking on 64GB RAM (equivalent to 1.5%/6.25%)
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6

# Reduce VFS cache pressure to keep inode/dentry caches longer
vm.vfs_cache_pressure = 50

# Reduced swappiness from 100 to 60 to balance ZRAM usage with page cache retention
# Lower value reduces aggressive swapping during LLM workloads, improving memory latency
# For 64GB RAM systems: 60 provides better balance between cache retention and swap usage
vm.swappiness = 60

# Prevent OOM-based attacks by using heuristic overcommit (kernel default behavior)
vm.overcommit_memory = 0

# Maximum map count increased for Vector Databases (ChromaDB), Java apps, and virtualization
# Set to 16M (high but finite) to prevent memory mapping exhaustion from leaks
vm.max_map_count = 16777216

# --- NETWORK PERFORMANCE ---
# Increase connection tracking for high-connection workloads (P2P, containers)
net.netfilter.nf_conntrack_max = 2097152
net.netfilter.nf_conntrack_tcp_timeout_established = 7200

# Fair Queue scheduler for low-latency interactive traffic
net.core.default_qdisc = fq
# CUBIC congestion control - stable, fair, and kernel-default for Fedora desktops
# BBRv1 is excluded: it has known fairness issues with mixed RTT flows and deep buffers
# BBRv2/v3 are not yet in mainline kernel 6.19; re-evaluate when upstreamed
net.ipv4.tcp_congestion_control = cubic
# Increase network device backlog for burst traffic handling
net.core.netdev_max_backlog = 16384
# Increase socket listen queue for high-traffic servers
net.core.somaxconn = 8192

# Buffer sizes optimized for high-throughput connections (32MB)
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.optmem_max = 1048576
net.ipv4.tcp_rmem = 4096 1048576 33554432
net.ipv4.tcp_wmem = 4096 1048576 33554432

# Connection turnover optimizations (P2P, torrents, high-traffic servers)
# Keep kernel default tcp_fin_timeout (60s) to avoid premature RST on high-latency paths
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# UDP tuning for uTP (torrent) and QUIC (video streaming) protocols
# Keep global UDP memory auto-sizing at kernel defaults (boot-time RAM-aware sizing).
# Do not set udp_wmem_min: kernel documentation states this knob has no effect.
net.ipv4.udp_rmem_min = 8192

# --- SYSTEM LIMITS ---
# Maximum file handles for high-concurrency workloads (containers, databases)
fs.file-max = 2097152
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576

# Filesystem protection against symlink/hardlink/FIFO attacks in world-writable directories
# Prevents local privilege escalation via /tmp and similar directories
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_regular = 2
fs.protected_fifos = 2

# Prevent core dumps from setuid binaries (exposes sensitive memory contents)
fs.suid_dumpable = 0

# --- SECURITY & PRIVACY ---
# Security mitigation: Prevent privileged port hijacking by non-root processes
net.ipv4.ip_unprivileged_port_start = 1024

# Security mitigation: Prevent local Denial of Service (DoS) via split-lock CPU locking
# Applies to both Intel and AMD CPUs with split-lock detection support
# NOTE: ~10ms penalty per split-lock occurrence in games/heavy apps; keep enabled for zero-trust
kernel.split_lock_mitigate = 1

# Restrict ptrace scope to prevent process injection attacks
kernel.yama.ptrace_scope = 1

# Restrict kernel pointer exposure to prevent KASLR bypass and exploitation
# kptr_restrict=2: always hide kernel pointers from non-root users
kernel.kptr_restrict = 2

# Restrict dmesg access to prevent kernel message information leakage
kernel.dmesg_restrict = 1

# Disable unprivileged eBPF to prevent privilege escalation via BPF programs
# eBPF JIT has a history of CVEs; only root should load BPF programs
kernel.unprivileged_bpf_disabled = 1

# Disable unprivileged user namespace cloning to prevent container escape attacks
# Non-root users cannot create new user namespaces (blocks many sandbox escapes)
kernel.unprivileged_userns_clone = 0

# Enable IPv6 privacy extensions (RFC 4941) for outbound connections
# Prevents address tracking while maintaining stable addresses for local services
# use_tempaddr=2: prefer temporary addresses for outbound, keep stable addresses
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2

# Reject unsolicited Router Advertisements to prevent rogue RA attacks
# SLAAC disabled on untrusted networks; use DHCPv6 or static config instead
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# --- IPv4 NETWORK SECURITY HARDENING ---
# Enable SYN cookies to mitigate SYN flood DoS attacks
net.ipv4.tcp_syncookies = 1

# Ignore RST packets for established connections (RFC 1337 - TIME_WAIT assassination fix)
net.ipv4.tcp_rfc1337 = 1

# Disable ICMP redirects (prevent route table poisoning)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Disable sending ICMP redirects (desktop is not a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable accepting secure redirects from known gateways (still a trust boundary risk)
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Disable source routing (prevents firewall bypass via explicit route options)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Enable reverse path filtering (prevents IP address spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets (malformed or spoofed source addresses) for forensic visibility
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Ignore ICMP echo requests to broadcast addresses (prevents Smurf DoS amplification)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses (prevents log pollution and false error handling)
net.ipv4.icmp_ignore_bogus_error_responses = 1
