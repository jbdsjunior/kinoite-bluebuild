# /etc/sysctl.d/61-browser-performance.conf

# --- MEMORY & ZRAM ---
# O Fedora utiliza ZRAM. Valores altos instruem o kernel a comprimir páginas inativas
# na RAM antes de descartar o cache de arquivos do VFS, mantendo o navegador rápido.
vm.swappiness = 150
vm.vfs_cache_pressure = 50

# Prevenção de I/O Stalls no Wayland/Browser. Em 64GB de RAM, limites altos criam
# gargalos de gravação repentinos no NVMe. Ajustado para ~1.2GB (background) e ~3.8GB (bloqueio).
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6

# Essencial para Chromium Site Isolation e milhares de abas sem crash de OOM virtual.
vm.max_map_count = 16777216

# --- CPU / SCHEDULER ---
# Agrupa processos do mesmo TTY/Sessão, melhorando a responsividade interativa do desktop.
kernel.sched_autogroup_enabled = 1

# --- NETWORK (Baixa Latência) ---
# FQ (Fair Queue) é a melhoria mais crítica para navegação: previne que downloads
# em background sufoquem requisições curtas de DNS/HTTP (mitiga bufferbloat).
net.core.default_qdisc = fq
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 4096

# --- SECURITY ---
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
