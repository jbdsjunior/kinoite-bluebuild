# /etc/sysctl.d/99-otimizacao-sistema.conf

# --- MEMORY & ZRAM (64GB + ZRAM + LLMs) ---
# Disable swap readahead (critical for ZRAM)
vm.page-cluster = 0
# Aggressive ZRAM utilization to protect NVMe and keep VFS cache
vm.swappiness = 180
# Retain inode/dentry cache longer
vm.vfs_cache_pressure = 50

# Prevent Direct Reclaim and kswapd CPU spikes under sudden heavy allocation
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

# Restrict writeback scale to prevent I/O stalls on NVMe
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6

# mmap ceiling for Chromium Site Isolation and LLM tensor loading
vm.max_map_count = 16777216

# --- NETWORK (Low Latency, Anti-Bufferbloat & BBR) ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 4096

# --- SECURITY & PROFILING ---
# Allow LLM/GPU profiling with CAP_SYSLOG
kernel.kptr_restrict = 1
# Restrict dmesg to root (prevent info leaks)
kernel.dmesg_restrict = 1
# Prevent cross-process memory injection (web protection), allows child process debug
kernel.yama.ptrace_scope = 1
