# /etc/sysctl.d/61-browser-performance.conf

# --- MEMORY & ZRAM (Otimizado para 64GB) ---
vm.swappiness = 150
vm.vfs_cache_pressure = 50

# Escala restrita de writeback para prevenir I/O stalls em NVMe
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6

# Teto mmap para Chromium Site Isolation (milhares de abas)
vm.max_map_count = 16777216

# --- NETWORK (Baixa Latência & Anti-Bufferbloat) ---
net.core.default_qdisc = fq
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 4096

# --- SECURITY ---
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
