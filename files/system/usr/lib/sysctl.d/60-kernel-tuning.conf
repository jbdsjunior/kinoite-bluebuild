# /usr/lib/sysctl.d/60-kernel-tuning.conf

# --- VIRTUAL MEMORY ---
# Mandatório para alocação massiva de tensores (LLMs) e estabilidade de jogos (Proton/Wine)
vm.max_map_count = 16777216

# --- NETWORK (BBR, MTU & Virtualization) ---
# BBR requer fq. Otimiza pacing de streaming de vídeo (Brave) e tráfego pesado
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# 'Loose mode' obrigatório para roteamento de Podman, Distrobox e libvirt/KVM
net.ipv4.conf.all.rp_filter = 2

# Evita conexões travadas ('black holes') fragmentando pacotes UDP/TCP grandes
net.ipv4.tcp_mtu_probing = 1

# Reduz latência de handshake TCP para conexões recorrentes (navegação pesada)
net.ipv4.tcp_fastopen = 3

# Expansão da tabela de rastreamento para suportar milhares de conexões P2P simultâneas (Torrents)
net.netfilter.nf_conntrack_max = 1048576

# --- SYSTEM LIMITS (Desenvolvimento) ---
# Evita erro "ENOSPC" no VSCode e ferramentas de build ao monitorar repositórios gigantes
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576
