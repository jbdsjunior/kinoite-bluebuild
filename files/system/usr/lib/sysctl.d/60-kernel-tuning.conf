# /usr/lib/sysctl.d/60-kernel-tuning.conf

# --- VIRTUAL MEMORY ---
# Valor equilibrado: suporta LLMs locais (até ~70B parâmetros) sem expor
# o sistema a memory exhaustion / heap spraying exploits.
vm.max_map_count = 4194304

# --- NETWORK (BBR, MTU & Virtualization) ---
# BBR requer fq. Otimiza pacing de streaming de vídeo (Brave) e tráfego pesado
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Strict mode: protege contra IP spoofing. Interfaces virtuais (Podman, libvirt)
# configuram rp_filter=2 automaticamente via NetworkManager.
# net.ipv4.conf.default.rp_filter = 1

# Evita conexões travadas ('black holes') fragmentando pacotes UDP/TCP grandes
net.ipv4.tcp_mtu_probing = 1

# Apenas cliente TFO — desktops não atuam como servidores TCP.
# Modo servidor (3) expõe a ataques de extração de cookies TFO (CVE-2019-11478/9).
net.ipv4.tcp_fastopen = 1

# Expansão da tabela de rastreamento para suportar milhares de conexões P2P simultâneas (Torrents)
# net.netfilter.nf_conntrack_max = 1048576

# --- SYSTEM LIMITS (Desenvolvimento) ---
# Evita erro "ENOSPC" no VSCode e ferramentas de build ao monitorar repositórios gigantes
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576
