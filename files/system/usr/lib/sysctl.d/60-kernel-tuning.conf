# /etc/sysctl.d/60-kernel-tuning.conf

# --- MEMORY, ZRAM & I/O OPTIMIZATIONS ---
vm.page-cluster = 0
vm.watermark_scale_factor = 125
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6
vm.vfs_cache_pressure = 50
vm.swappiness = 150
vm.max_map_count = 16777216

# --- NETWORK PERFORMANCE ---
net.netfilter.nf_conntrack_max = 2097152
net.netfilter.nf_conntrack_tcp_timeout_established = 7200
net.core.default_qdisc = fq
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.optmem_max = 1048576
net.ipv4.tcp_rmem = 4096 1048576 33554432
net.ipv4.tcp_wmem = 4096 1048576 33554432
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.udp_rmem_min = 8192

# --- SYSTEM LIMITS ---
fs.file-max = 2097152
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576
fs.suid_dumpable = 0

# --- SECURITY, PRIVACY & CONTAINERS ---
kernel.sysrq = 0
kernel.perf_event_paranoid = 2
net.core.bpf_jit_harden = 2

# IP Forwarding (Requisito Podman/Libvirt)
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
net.ipv4.tcp_max_syn_backlog = 2048
net.ipv4.tcp_synack_retries = 2
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1

# IPv6 Privacy Extensions
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2

# --- IPv4 NETWORK SECURITY HARDENING ---
net.ipv4.tcp_rfc1337 = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# rp_filter = 2 (Compatibilidade redes bridge Podman)
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1