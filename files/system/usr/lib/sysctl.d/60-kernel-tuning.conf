# --- MEMORY, SWAP & I/O OPTIMIZATIONS ---
vm.page-cluster = 0
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

# Disabled: Fixed byte limits cause I/O spikes on 64GB RAM/NVMe during heavy torrent writes
# vm.dirty_background_bytes = 134217728
# vm.dirty_bytes = 536870912

# Added: Ratio-based limits for smoother NVMe I/O consolidation with 64GB RAM
vm.dirty_background_ratio = 3
vm.dirty_ratio = 10

vm.vfs_cache_pressure = 50
vm.swappiness = 100
vm.compaction_proactiveness = 50

# --- NETWORK PERFORMANCE ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_fastopen = 3
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 16384 16777216

# Added: Safe reuse of TIME_WAIT sockets for high connection turnover (torrents)
net.ipv4.tcp_tw_reuse = 1

# Added: UDP tuning for uTP (torrent) and QUIC (video streaming) protocols
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192
net.ipv4.udp_mem = 65536 131072 262144


# --- SYSTEM LIMITS ---
fs.file-max = 2097152
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288
vm.max_map_count = 1048576

# --- SECURITY & PRIVACY ---
kernel.yama.ptrace_scope = 1

# Disabled: IPv6 Privacy Extensions. Prefer stable IPs for home workstation
# and optimal P2P/Torrent port forwarding.
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

net.ipv6.conf.all.accept_ra = 1
net.ipv6.conf.default.accept_ra = 1

net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_rfc1337 = 1