# /usr/lib/sysctl.d/60-kernel-tuning.conf

# /usr/lib/sysctl.d/60-kernel-tuning.conf

# --- NETWORK (BBR & MTU) ---
# BBR requer FQ. Otimiza pacing de vídeo e estabilidade de tráfego pesado.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Otimização contra MTU Black Holes para pacotes UDP/TCP fragmentados
net.ipv4.tcp_mtu_probing = 1

# --- I/O & MEMORY (Prevenção de Stutters em 64GB RAM) ---
# Força gravações mais frequentes e menores no NVMe ao manipular LLMs/arquivos gigantes.
# 2% background flush (~1.2GB), 5% limit flush (~3.2GB). Padrões são 10% / 20%.
vm.dirty_background_ratio = 2
vm.dirty_ratio = 5

# --- CPU OPTIMIZATION (Ryzen 5950X) ---
# Desabilita o kernel panic em travamentos não recuperáveis para poupar interrupções 
# do processador e liberar o hardware PMU para profiling de desenvolvimento (perf).
kernel.nmi_watchdog = 0
