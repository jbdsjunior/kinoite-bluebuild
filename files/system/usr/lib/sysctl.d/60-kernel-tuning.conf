# --- 1. MEMORY, SWAP & I/O OPTIMIZATIONS (64GB RAM + NVMe + ZRAM) ---

# Disable read-ahead for swap to optimize ZRAM and SSD random access
vm.page-cluster = 0

# Aggressive adjustments to avoid stalls during memory pressure
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125

# Writeback cache tuning for large RAM and fast NVMe
# Background write at 128MB to prevent I/O spikes
vm.dirty_background_bytes = 134217728
# Force synchronous write at 512MB to maintain system responsiveness
vm.dirty_bytes = 536870912

# Retain directory and inode structures in cache for faster compilations
vm.vfs_cache_pressure = 50

# Aggressive ZRAM usage priority over disk swap
vm.swappiness = 100

# High proactive compaction for contiguous memory allocation (LLMs/KVM)
vm.compaction_proactiveness = 50


# --- 2. NETWORK PERFORMANCE (BBR, TCP & High-Bandwidth) ---

# Google BBR congestion control and Fair Queueing
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Enable TCP Fast Open to reduce handshake latency
net.ipv4.tcp_fastopen = 3

# Increase backlog for simultaneous connections
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192

# Increase TCP read/write buffers for high-speed networks and containers
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 16384 16777216


# --- 3. SYSTEM LIMITS (IDEs, LLMs & Virtualization) ---

# Increase open file limit for heavy workloads and Flatpaks
fs.file-max = 2097152

# Increase Inotify limits for IDEs and file sync tools
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288

# High memory map count for LLMs, gaming, and virtualization
vm.max_map_count = 1048576


# --- 4. SECURITY & PRIVACY ---

# Restrict ptrace scope to mitigate code injection
kernel.yama.ptrace_scope = 1

# IPv6 Privacy Extensions
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2
net.ipv6.conf.all.accept_ra = 1
net.ipv6.conf.default.accept_ra = 1

# Ignore ICMP redirects to mitigate MITM attacks
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# TCP SYN Flood protection
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_rfc1337 = 1
