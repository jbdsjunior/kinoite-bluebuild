# /etc/sysctl.d/60-workstation-llm.conf

# --- MEMORY & ZRAM (Otimizado para 64GB + ZRAM + NVMe) ---
# Otimiza uso da ZRAM do Fedora (prioriza compressão vs descarte de VFS)
vm.swappiness = 150
vm.vfs_cache_pressure = 50

# Escala de writeback para mitigar stalls de I/O em checkpoints de LLMs (~1.2GB bg / ~3.8GB block)
vm.dirty_background_ratio = 2
vm.dirty_ratio = 6

# Teto estendido para mmap (llama.cpp, bancos vetoriais, Java)
vm.max_map_count = 16777216

# --- FILESYSTEM / DEV TOOLS ---
fs.file-max = 2097152
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 8192

# --- CPU / SCHEDULER ---
kernel.sched_autogroup_enabled = 1

# --- NETWORK (Otimizado para multitarefa) ---
# Fair Queue previne lag no Wayland/Browser durante downloads pesados (huggingface)
net.core.default_qdisc = fq
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 4096

# --- SECURITY BASELINE (Zero impacto em performance) ---
kernel.sysrq = 0
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.perf_event_paranoid = 2
net.core.bpf_jit_harden = 2

net.ipv4.tcp_rfc1337 = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
