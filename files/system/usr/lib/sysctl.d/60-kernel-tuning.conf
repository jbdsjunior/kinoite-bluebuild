# /usr/lib/sysctl.d/60-kernel-tuning.conf

# --- VIRTUAL MEMORY & I/O ---
# Aumento do limite de mapeamento de memória para execução de LLMs (Ollama/vLLM) e Gaming (Wine/Proton)
vm.max_map_count = 16777216

# --- NETWORK (BBR, MTU & Virtualization) ---
# O algoritmo BBR requer obrigatoriamente o escalonador fq para o pacing correto de pacotes
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# rp_filter em modo 'loose' (2) para evitar o bloqueio de pacotes legítimos em bridges de containers (Podman/Distrobox) e VMs (KVM)
net.ipv4.conf.all.rp_filter = 2

# Habilita sondagem de MTU para mitigar problemas de fragmentação e 'black holes' em redes domésticas ou VPNs
net.ipv4.tcp_mtu_probing = 1

# --- SYSTEM LIMITS (Desenvolvimento & Containers) ---
# Expansão dos limites de inotify para evitar falhas em IDEs (VSCode/IntelliJ) e monitoramento de grandes árvores de diretórios
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576

# --- SECURITY & HARDENING ---
# Restrições de acesso ao log do kernel (dmesg) e símbolos para usuários sem privilégios
kernel.yama.ptrace_scope = 1
kernel.kptr_restrict = 1
kernel.dmesg_restrict = 1

# --- CONFIGURAÇÕES NÃO RECOMENDADAS PARA SEU HARDWARE (64GB RAM + NVMe) ---

# DESABILITADO: O kernel gerencia buffers de escrita de forma mais eficiente de forma dinâmica em NVMes modernos.
# vm.dirty_background_ratio = 5
# vm.dirty_ratio = 15

# DESABILITADO: Mecanismos de compactação de memória irrelevantes para sistemas com alta capacidade de RAM (64GB).
# vm.watermark_boost_factor = 0
# vm.watermark_scale_factor = 125
# vm.vfs_cache_pressure = 50

# DESABILITADO: Parâmetros de zRAM são gerenciados nativamente pelo zram-generator no Fedora Kinoite.
# vm.page-cluster = 0
# vm.swappiness = 100

# DESABILITADO: O valor padrão (4096) do Fedora é suficiente para workloads de workstation e APIs de LLM.
# net.core.somaxconn = 8192
