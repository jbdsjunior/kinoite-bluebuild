# /usr/lib/sysctl.d/60-kernel-tuning.conf
# Otimizado para Workstation: Ryzen 9 5950X, 64GB RAM, NVMe, LLMs e Containers

# --- NETWORK (BBR, MTU & Podman Forwarding) ---
# BBR requer FQ. Otimiza pacing de vídeo e estabilidade de tráfego pesado.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Otimização contra MTU Black Holes para pacotes UDP/TCP fragmentados.
net.ipv4.tcp_mtu_probing = 1

# Habilita roteamento IPv4/IPv6 crítico para redes bridge rootless do Podman.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# --- I/O & MEMORY (Prevenção de Stutters em 64GB RAM & Carga de LLMs) ---
# Limites percentuais em 64GB retêm muito buffer (>1.2GB) antes do flush, causando engasgos no NVMe.
# Limites absolutos definidos: 128MB (background) e 512MB (bloqueio forçado).
vm.dirty_background_bytes = 134217728
vm.dirty_bytes = 536870912

# Zera os ratios percentuais para que os limites em bytes assumam o controle.
vm.dirty_background_ratio = 0
vm.dirty_ratio = 0

# Reduz a tendência de swap para preservar tensores na RAM ao carregar modelos massivos.
vm.swappiness = 10

# Expande limites mmap para carregamento de safetensors massivos na memória sem crash.
vm.max_map_count = 1048576

# --- CPU OPTIMIZATION (Ryzen 5950X / Desenvolvimento) ---
# Desabilita o kernel panic em travamentos não recuperáveis para poupar interrupções
# do processador e liberar o hardware PMU para profiling de desenvolvimento (perf).
kernel.nmi_watchdog = 0
