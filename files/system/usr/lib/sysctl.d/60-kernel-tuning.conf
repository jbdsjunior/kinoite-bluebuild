# --- MEMORY, SWAP & I/O OPTIMIZATIONS ---
# Disable zswap clustering for lower latency (SSD/NVMe systems)
vm.page-cluster = 0
# Prevent aggressive watermark boosting to reduce latency spikes
vm.watermark_boost_factor = 0
# Scale watermarks for high-throughput workloads
vm.watermark_scale_factor = 125

# Absolute limits for NVMe to avoid massive I/O stutters with large RAM
vm.dirty_background_bytes = 134217728
vm.dirty_bytes = 536870912

# Reduce VFS cache pressure to keep inode/dentry caches longer
vm.vfs_cache_pressure = 50
# Balanced swappiness for hybrid workloads (local LLM + general use)
vm.swappiness = 100
# Aggressive memory compaction for large contiguous allocations
vm.compaction_proactiveness = 20

# --- NETWORK PERFORMANCE ---
# Increase connection tracking for high-connection workloads (P2P, containers)
net.netfilter.nf_conntrack_max = 2097152
net.netfilter.nf_conntrack_tcp_timeout_established = 7200

# Fair Queue scheduler for low-latency interactive traffic
net.core.default_qdisc = fq
# BBR congestion control for optimal throughput
net.ipv4.tcp_congestion_control = bbr
# Enable TCP Fast Open for reduced latency on repeat connections
net.ipv4.tcp_fastopen = 3
# Increase network device backlog for burst traffic handling
net.core.netdev_max_backlog = 16384
# Increase socket listen queue for high-traffic servers
net.core.somaxconn = 8192

# Buffer sizes optimized for high-throughput connections (32MB)
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.optmem_max = 1048576
net.ipv4.tcp_rmem = 4096 1048576 33554432
net.ipv4.tcp_wmem = 4096 1048576 33554432

# Connection turnover optimizations (P2P, torrents, high-traffic servers)
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_mtu_probing = 1
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# UDP tuning for uTP (torrent) and QUIC (video streaming) protocols
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192
net.ipv4.udp_mem = 65536 131072 262144

# --- SYSTEM LIMITS ---
# Maximum file handles for high-concurrency workloads (containers, databases)
fs.file-max = 2097152
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 1048576

# Maximum map count increased for Vector Databases (ChromaDB), Java apps, and virtualization
vm.max_map_count = 2147483642

# Disable split-lock mitigation for better CPU performance in virtualization/KVM workloads
kernel.split_lock_mitigate = 0

# --- SECURITY & PRIVACY ---
# Restrict ptrace scope to prevent process injection attacks
kernel.yama.ptrace_scope = 1

# Prefer stable IPv6 addresses for home workstation (P2P port forwarding, local APIs)
net.ipv6.conf.all.use_tempaddr = 0
net.ipv6.conf.default.use_tempaddr = 0

# Accept Router Advertisements for proper IPv6 connectivity
net.ipv6.conf.all.accept_ra = 1
net.ipv6.conf.default.accept_ra = 1

# Security hardening: Disable ICMP redirects and enable SYN cookies
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.tcp_syncookies = 1
# Ignore RST packets for established connections (RFC 1337)
net.ipv4.tcp_rfc1337 = 1
