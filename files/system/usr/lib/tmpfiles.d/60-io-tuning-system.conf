# KVM/Libvirt System-wide VM Images
d /var/lib/libvirt/images 0755 root root -
h /var/lib/libvirt/images - - - - +C

# System-wide container volumes (Podman/Docker)
# Caution: Only apply to 'volumes', never to the parent 'storage' directory.
d /var/lib/containers/storage/volumes 0755 root root -
h /var/lib/containers/storage/volumes - - - - +C