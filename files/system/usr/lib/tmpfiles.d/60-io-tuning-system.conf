# KVM/Libvirt system-wide VM images
d /var/lib/libvirt/images 0755 root root -
h /var/lib/libvirt/images - - - - +C

# System-wide container storage (Podman/Docker)
d /var/lib/containers/storage 0711 root root -
h /var/lib/containers/storage - - - - +C
d /var/lib/containers/storage/volumes 0755 root root -
h /var/lib/containers/storage/volumes - - - - +C
d /var/lib/containers/storage/overlay 0711 root root -
h /var/lib/containers/storage/overlay - - - - +C
