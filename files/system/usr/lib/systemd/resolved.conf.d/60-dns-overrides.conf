# /usr/lib/systemd/resolved.conf.d/60-dns-overrides.conf
[Resolve]

# --- 1. Primary DNS ---
# Active: Cloudflare (Speed & Redundancy with DoT)
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com

# Alternative: ControlD (Ads & Malware Blocking Profile - p2)
# DNS=76.76.2.2#p2.freedns.controld.com 76.76.10.2#p2.freedns.controld.com 2606:1a40::2#p2.freedns.controld.com 2606:1a40:1::2#p2.freedns.controld.com

# --- 2. Fallback DNS ---
# Active: Google DNS (High Availability, DoT Support)
FallbackDNS=8.8.8.8#dns.google 8.8.4.4#dns.google 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google

# Alternative: Quad9 (High Privacy, Malware Blocking, DoT Support)
# FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net

# -------------------------------------------------------------------------
# Privacy & Security Protocols
# -------------------------------------------------------------------------
## DNS over TLS (Active: yes | Alternative: opportunistic)
DNSOverTLS=yes

## DNSSEC validation (Active: yes | Alternative: allow-downgrade)
DNSSEC=yes


# -------------------------------------------------------------------------
# Local Network Noise Reduction
# -------------------------------------------------------------------------
MulticastDNS=no
LLMNR=no
ResolveUnicastSingleLabel=no

# -------------------------------------------------------------------------
# Caching & System Integration
# -------------------------------------------------------------------------
ReadEtcHosts=yes
Cache=yes
CacheFromLocalhost=no
DNSStubListener=yes