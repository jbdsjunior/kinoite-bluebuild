# /usr/lib/systemd/resolved.conf.d/60-dns-overrides.conf
[Resolve]
# =========================================================================
# CLOUDFLARE
# =========================================================================
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com

# =========================================================================
# DIRETRIZES DE CRIPTOGRAFIA E INTEGRIDADE
# =========================================================================
# Mude para 'opportunistic' se for um notebook que viaja muito
DNSOverTLS=yes
# Evita quebra de sites mal configurados na internet
DNSSEC=allow-downgrade

# =========================================================================
# OTIMIZAÇÕES DE REDE LOCAL E PERFORMANCE
# =========================================================================
MulticastDNS=resolve
LLMNR=no
Cache=yes
CacheFromLocalhost=no