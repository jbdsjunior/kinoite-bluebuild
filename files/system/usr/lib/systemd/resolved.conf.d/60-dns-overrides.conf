# /usr/lib/systemd/resolved.conf.d/60-dns-overrides.conf
[Resolve]
# =========================================================================
# CONTROL D (Ads & Tracking / p2)
# =========================================================================
# Filtra anúncios e rastreadores nativamente, com suporte a Anycast ECS.
# DNS=76.76.2.11#p2.freedns.controld.com 76.76.10.11#p2.freedns.controld.com 2606:1a40::11#p2.freedns.controld.com 2606:1a40:1::11#p2.freedns.controld.com

# =========================================================================
# QUAD9
# =========================================================================

# Sem bloqueio de malware + Com ECS (Foco total em performance pura)
# DNS=9.9.9.12#dns12.quad9.net 149.112.112.12#dns12.quad9.net 2620:fe::12#dns12.quad9.net 2620:fe::fe:12#dns12.quad9.net

# Com bloqueio de malware + Com ECS (Segurança balanceada com performance)
DNS=9.9.9.11#dns11.quad9.net 149.112.112.11#dns11.quad9.net 2620:fe::11#dns11.quad9.net 2620:fe::fe:11#dns11.quad9.net

# Com bloqueio de malware + Sem ECS (Segurança e privacidade máxima)
# DNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net

# =========================================================================
# CLOUDFLARE
# =========================================================================

# Padrão (Sem filtros, foco em performance e privacidade)
# FallbackDNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com

# Segurança (Bloqueio de Malware e Phishing)
# FallbackDNS=1.1.1.2#security.cloudflare-dns.com 1.0.0.2#security.cloudflare-dns.com 2606:4700:4700::1112#security.cloudflare-dns.com 2606:4700:4700::1002#security.cloudflare-dns.com

# Família (Bloqueio de Malware, Phishing e Conteúdo Adulto)
# FallbackDNS=1.1.1.3#family.cloudflare-dns.com 1.0.0.3#family.cloudflare-dns.com 2606:4700:4700::1113#family.cloudflare-dns.com 2606:4700:4700::1003#family.cloudflare-dns.com

# =========================================================================
# DIRETRIZES DE CRIPTOGRAFIA E INTEGRIDADE
# =========================================================================
# 'yes' garante DoT estrito (Strict DoT). Impede espionagem e ataques do provedor local.
DNSOverTLS=yes

# Validação criptográfica local. Garante que ninguém alterou o IP de destino no meio do caminho.
DNSSEC=yes

# =========================================================================
# OTIMIZAÇÕES DE REDE LOCAL E PERFORMANCE
# =========================================================================
MulticastDNS=resolve
LLMNR=resolve
Cache=yes
CacheFromLocalhost=no
