# /usr/lib/systemd/resolved.conf.d/60-dns-overrides.conf
[Resolve]

# --- Primary DNS ---
# Cloudflare (Speed & Redundancy with DNS-over-TLS)
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com

# --- Fallback DNS ---
# Google DNS (High Availability, DoT Support) - REQUIRED for DNSSEC failover
FallbackDNS=8.8.8.8#dns.google 8.8.4.4#dns.google 2001:4860:4860::8888#dns.google 2001:4860:4860::8844#dns.google

# Quad9 (Alternative High Privacy, Malware Blocking, DoT Support)
# FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net

# -------------------------------------------------------------------------
# Privacy & Security Protocols
# -------------------------------------------------------------------------
## DNS over TLS: 'yes' = strict, 'opportunistic' = fallback to plaintext
## Note: This is overridden by /etc/systemd/resolved.conf.d/50-dns-overrides.conf
## which sets opportunistic mode for better reliability on home networks
DNSOverTLS=yes

## DNSSEC validation: 'yes' = require, 'allow-downgrade' = fallback if unsupported
## With FallbackDNS configured, DNSSEC failures on primary will use fallback
DNSSEC=yes

# -------------------------------------------------------------------------
# Local Network Integration (Home/Workstation)
# -------------------------------------------------------------------------
# Enable mDNS for local service discovery (printers, Chromecast, NAS)
MulticastDNS=yes
# Enable LLMNR for legacy Windows/IoT device discovery on trusted home networks
# Required by spec: "active local discovery (printers, smart TVs, NAS)"
LLMNR=yes
# Resolve single-label domains via unicast (useful for home labs)
ResolveUnicastSingleLabel=yes

# -------------------------------------------------------------------------
# Caching & System Integration
# -------------------------------------------------------------------------
# Honor /etc/hosts for local overrides
ReadEtcHosts=yes
# Enable local DNS caching for performance
Cache=yes
MaxCacheSize=16384
# Do not import cache from localhost (avoid stale entries)
CacheFromLocalhost=no
# Listen on port 53 for system-wide DNS resolution
DNSStubListener=yes
