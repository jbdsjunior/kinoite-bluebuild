[zram0]
# Sets the size to 1.5x physical RAM, capped at 32GB
# Prevents wasting address space on machines with abundant RAM
zram-size = min(ram * 1.5, 32768)

# Zstd compression algorithm: excellent compression ratio with good speed
compression-algorithm = zstd

# Maximum priority (32767) ensures zram is preferred over disk swap
swap-priority = 32767

# Use native swap format (not a filesystem) for optimal performance
fs-type = swap

# Enable memory hot-remove support for dynamic zram resizing
memory-hot-remove = true