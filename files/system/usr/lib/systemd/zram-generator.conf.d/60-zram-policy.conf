[zram0]
# ZRAM configuration: compressed swap in RAM (no disk swap used)
# Size set to 1.5x physical RAM, capped at 32GB to avoid wasting address space
zram-size = min(ram * 1.5, 32768)

# lz4 compression algorithm
compression-algorithm = lz4

# Maximum priority (32767) ensures zram is preferred over any disk swap
swap-priority = 32767

# Use native swap format (not a filesystem) for optimal performance
fs-type = swap

# Enable memory hot-remove support for dynamic zram resizing
memory-hot-remove = true
