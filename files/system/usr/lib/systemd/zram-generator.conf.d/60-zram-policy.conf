[zram0]
# Reduced from 1.5x to 0.5x ratio to balance CPU overhead vs memory savings
# For 64GB RAM: creates max 16GB ZRAM instead of 32GB, reducing zstd CPU overhead during LLM workloads
zram-size = min(ram * 0.5, 16384)
# Use zstd instead of lz4 for higher compression ratios in LLM offloading
compression-algorithm = zstd
swap-priority = 32767
fs-type = swap
memory-hot-remove = true
