# --- Integração Wayland (Navegadores e Apps) ---
# Força o Firefox a usar Wayland nativo (embora no Firefox 121+ já seja o padrão, garante o funcionamento).
MOZ_ENABLE_WAYLAND=1

# Instrui aplicativos Electron (VSCode, Obsidian, Discord) a tentarem o Wayland nativamente, fazendo fallback para X11 (Xwayland) se falhar.
ELECTRON_OZONE_PLATFORM_HINT=auto

# --- Workarounds NVIDIA e KWin ---
# ATENÇÃO: O KWIN_DRM_NO_AMS=1 desativa o Atomic Mode Setting.
# MANTENHA APENAS se você tiver glitches no cursor (piscando/sumindo) ou tela preta ao retornar da suspensão.
# Se você usa Plasma 6.1+ e Driver NVIDIA 555/560+ (que suportam Explicit Sync), remover essa linha pode melhorar a performance.
KWIN_DRM_NO_AMS=1

# Desativa G-Sync/VRR legado do OpenGL.
# Útil para evitar flickering e stuttering bizarro no Xwayland. Deixe o Wayland/KWin gerenciar a taxa de atualização (VRR) nativamente pelo painel do KDE.
__GL_GSYNC_ALLOWED=0
__GL_VRR_ALLOWED=0

# --- Melhorias Opcionais Recomendadas (Aceleração e Buffers) ---
# Força o uso correto do alocador de memória do Wayland para a NVIDIA (resolve problemas de renderização em alguns apps).
GBM_BACKEND=nvidia-drm

# (Opcional) Habilita aceleração de decodificação de vídeo via hardware no Firefox no Wayland.
# Requer o pacote `nvidia-vaapi-driver` instalado no sistema.
LIBVA_DRIVER_NAME=nvidia
NVD_BACKEND=direct