# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-amd
description: "Customized Fedora Kinoite image optimized for AMD-only systems"

# base-image: ghcr.io/blue-build/base-images/fedora-kinoite
# base-image: quay.io/fedora/fedora-kinoite
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest
platforms:
  - linux/amd64
modules:
  # Inherits all shared system configurations (packages, flatpaks, kargs, etc.)
  - from-file: common-base.yml

  # Digital signing module for image integrity and verified updates
  - type: initramfs
  - type: signing
