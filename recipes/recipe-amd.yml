---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-amd
description: "Customized Fedora Kinoite image optimized for AMD-only systems"

base-image: quay.io/fedora/fedora-kinoite
image-version: latest
platforms:
  - linux/amd64
modules:
  # Pulls all shared configurations from the base recipe file
  - from-file: common-base.yml

  # Digitally signs the final image. This is crucial for 'rpm-ostree' verification
  # after the initial rebase on the client side.
  - type: initramfs
  - type: signing
