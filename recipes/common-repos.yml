---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# Repository Priority Hierarchy (lower number = higher priority):
#   90  - negativo17 (multimedia codecs, drivers)
#   120 - terra (additional packages)
#   150 - vendor repos (chrome, brave, edge, vscode)
modules:
  - type: bling
    install:
      # Install negativo17 repos with priority 90, removes RPMFusion if present
      - negativo17
      # Alternative: install RPMFusion repos (including tainted) & disable negativo17
      # - rpmfusion

  - type: rpm-ostree
    repos:
      - brave-browser.repo
      - google-chrome.repo
      - microsoft-edge.repo
      - terra.repo
      - vscode.repo
