# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-nvidia
description: >-
  Customized Fedora Kinoite image for AMD + NVIDIA hybrid systems with CUDA
  support

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: latest
platforms:
  - linux/amd64

modules:
  - from-file: common-base.yml

  - type: files
    files:
      - source: nvidia
        destination: /

  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - nvidia-container-toolkit

  - type: systemd
    system:
      enabled:
        - nvidia-mps.service

        - nvidia-persistenced.service
        - nvidia-powerd.service

  - type: initramfs
  - type: signing
