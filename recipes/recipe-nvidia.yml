# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-nvidia
description: "Customized Fedora Kinoite image for AMD + NVIDIA hybrid systems
  with CUDA support"

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: latest
platforms:
  - linux/amd64

modules:
  - from-file: common-base.yml

  # - type: files
  #   files:
  #     - source: nvidia
  #       destination: /

  - type: rpm-ostree
    install:
      - nvidia-container-toolkit

  - type: dnf
    remove:
      auto-remove: true
      packages:
        - kcm-fcitx5
        - fcitx5-*
        - htop
        - kate
        - kate-plugins

  # - type: systemd
  #   system:
  #     enabled:
  #       - nvidia-persistenced.service
  #       - nvidia-compute-tuning.service

  - type: initramfs
  - type: signing
