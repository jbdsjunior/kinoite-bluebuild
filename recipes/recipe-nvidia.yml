---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-nvidia
description: "Customized Fedora Kinoite image for AMD + NVIDIA hybrid systems
  with CUDA support"

base-image: quay.io/fedora/fedora-kinoite
image-version: latest
platforms:
  - linux/amd64

modules:
  - from-file: common-base.yml

  # O módulo aperfeiçoado do modelo
  - type: script
    env:
      PUBLIC_KEY_DER_PATH: /etc/pki/akmods/certs/public_key.der
    secrets:
      - type: file
        source: ./MOK.priv
        mount:
          type: file
          destination: /tmp/certs/private_key.priv
    scripts:
      - installnvidia.sh

  - type: kargs
    kargs:
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - nvidia-drm.modeset=1
      - nvidia-drm.fbdev=1

  - type: script
    snippets:
      - cp /usr/lib/modprobe.d/nvidia-modeset.conf
        /etc/modprobe.d/nvidia-modeset.conf
      - sed -i 's/omit_drivers/force_drivers/g'
        /usr/lib/dracut/dracut.conf.d/99-nvidia.conf
      - sed -i 's/ nvidia / amdgpu nvidia /g'
        /usr/lib/dracut/dracut.conf.d/99-nvidia.conf

  - type: initramfs
  - type: signing
