---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

name: kinoite-nvidia
description: "Customized Fedora Kinoite image for AMD + NVIDIA hybrid systems
  with CUDA support"

base-image: ghcr.io/ublue-os/kinoite-nvidia
image-version: 44
platforms:
  - linux/amd64
modules:
  # Inherits all shared system configurations (packages, flatpaks, kargs, etc.)
  - from-file: common-base.yml

  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - nvidia-container-toolkit

  # Digital signing module for image integrity and verified updates
  - type: initramfs
  - type: signing
