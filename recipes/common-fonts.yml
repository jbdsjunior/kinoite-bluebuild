# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - liberation-fonts

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - SourceCodePro
        - Terminus
        - JetBrainsMono
        - NerdFontsSymbolsOnly

      google-fonts:
        - Google Sans
        - Google Sans Code
        - Google Sans Flex
        - Google Sans Text
        - Arimo
        - Caladea
        - Carlito
        - Comic Neue
        - Cousine
        - Tinos
