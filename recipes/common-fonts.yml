# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - liberation-fonts

  - type: fonts
    fonts:
      nerd-fonts:
        - NerdFontsSymbolsOnly

      google-fonts:
        # Google
        - Google Sans
        - Google Sans Code
        - Google Sans Flex
        - Google Sans Text

        # Microsoft Replacements
        - Arimo # (Replaces Arial)
        - Caladea # (Replaces Cambria)
        - Carlito # (Replaces Calibri)
        - Comic Neue # (Replaces Comic Sans MS)
        - Cousine # (Replaces Courier New)
        - Tinos # (Replaces Times New Roman)
