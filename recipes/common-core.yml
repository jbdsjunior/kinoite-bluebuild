# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        # Locale and language support
        - langpacks-pt_BR

        # KDE base security integration
        - plasma-firewall

        # Hardware and observability baseline
        - lm_sensors
