# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      enabled:
        - podman.socket
        # Native immutable image update staging (rpm-ostree)
        - rpm-ostreed-automatic.timer
        # System-scope Flatpak updates
        - flatpak-system-update.timer
        # Daily root-scope Podman cleanup
        - podman-prune-root.timer
    user:
      enabled:
        # User-scope Flatpak updates
        - flatpak-user-update.timer
        # Daily rootless Podman cleanup
        - podman-prune-user.timer
