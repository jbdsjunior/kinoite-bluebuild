# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: systemd
    system:
      masked:
        # Prevent boot delays waiting for DHCP allocation
        - NetworkManager-wait-online.service
      enabled:
        - podman.socket
        # Atualização nativa da imagem imutável (rpm-ostree)
        - rpm-ostreed-automatic.timer
        # Atualização de Flatpaks em escopo de sistema
        - flatpak-system-update.timer
    user:
      enabled:
        # Atualização de Flatpaks em escopo de usuário
        - flatpak-user-update.timer
