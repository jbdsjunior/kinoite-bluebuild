---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      allow-erasing: true
      skip-unavailable: true
      packages:
        # Hardware acceleration (Primary AMD RX 6600 XT)
        - mesa-va-drivers
        - mesa-vulkan-drivers

        # Full multimedia framework and FFmpeg integration
        - ffmpeg
        - ffmpeg-libs

        - gstreamer1-plugins-bad
        - gstreamer1-plugins-ugly
        - gstreamer1-libav

        # Image format support (HEIC/HEVC/AVIF)
        - heif-pixbuf-loader
        - libheif
        - libheif-tools

        # High-definition Bluetooth audio (AAC, LDAC)
        - libfdk-aac
        - libldac
        - lame
        - @multimedia
