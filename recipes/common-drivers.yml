---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    repos:
      nonfree: negativo17
    replace:
      - from-repo: fedora-multimedia
        skip-unavailable: true
        packages:
          - libva
          - mesa-dri-drivers
          - mesa-filesystem
          - mesa-libEGL
          - mesa-libGL
          - mesa-libgbm
          - mesa-va-drivers
          - mesa-vulkan-drivers
          - libheif

- type: dnf
  install:
    packages:
      - repo: fedora-multimedia
        packages:
        - gstreamer1-plugins-bad
        - gstreamer1-plugins-ugly
        - gstreamer1-vaapi

        - ffmpeg
        - ffmpeg-libs

        - libfdk-aac
        - libavcodec

        - libva-utils
        - pipewire-libs-extra
        - heif-pixbuf-loader
