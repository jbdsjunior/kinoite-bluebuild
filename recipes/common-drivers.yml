---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      allow-erasing: true
      skip-unavailable: true
      packages:
        # Hardware acceleration (Primary AMD GPU)
        - mesa-va-drivers-freeworld
        - mesa-vdpau-drivers-freeworld
        - libva-utils
        - vdpauinfo

        # GStreamer and FFmpeg codecs (via RPMFusion)
        - ffmpeg
        - ffmpeg-libs
        - gstreamer1-plugins-bad-free-extras
        - gstreamer1-plugins-bad-freeworld
        - gstreamer1-plugins-ugly

        # Image format support (HEIC/HEVC)
        - libheif-freeworld
        - heif-pixbuf-loader
        - libheif-tools

        # High-definition Bluetooth audio codecs
        - pipewire-codec-aptx
