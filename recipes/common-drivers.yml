---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    install:
      allow-erasing: true
      skip-unavailable: true
      packages:
        - libopenjph # Manually install dependency for `libheif`, as Negativo upstreamed it

  - type: dnf
    install:
      packages:
        - repo: fedora-multimedia
          skip-unavailable: true
          packages:
            - libva
            - libva-utils
            - mesa-dri-drivers
            - mesa-filesystem
            - mesa-libEGL
            - mesa-libGL
            - mesa-libgbm
            - mesa-va-drivers
            - mesa-vulkan-drivers
            - libheif

  - type: dnf
    install:
      packages:
        - repo: fedora-multimedia
          skip-unavailable: true
          packages:
            - gstreamer1-plugins-bad
            - gstreamer1-plugins-ugly
            - gstreamer1-vaapi

            - ffmpeg
            - ffmpeg-libs

            - libfdk-aac
            - libavcodec

            - pipewire-libs-extra
            - heif-pixbuf-loader
