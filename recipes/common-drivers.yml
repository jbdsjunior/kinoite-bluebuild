---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    install:
      allow-erasing: true
      packages:
        - mesa-va-drivers
        - mesa-vulkan-drivers

  - type: dnf
    install:
      allow-erasing: true
      packages:
        - ffmpeg
        # - gstreamer1-plugins-base # is already installed
        # - gstreamer1-plugins-good  # is already installed
        - gstreamer1-plugins-bad
        - gstreamer1-plugins-ugly
        # - gstreamer1-plugin-libav  # is already installed
        - gstreamer1-vaapi
        - libavcodec

