# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    remove:
      auto-remove: true
      packages:
        - firefox
        - plasma-discover-rpm-ostree
        - fedora-flathub-remote
        # - plasma-welcome-fedora
        # - fedora-third-party
        # - fedora-workstation-repositories
        - kcm-fcitx5
        - fcitx5-*
        - htop
        - kate

        # --- CLI Tools ---
        - vim-common
        - vim-data
        - vim-enhanced
        - vim-filesystem
        - vim-minimal

        # --- Unused Hardware Drivers & Firmware (Non-AMD/Nvidia) ---
        # Intel Hardware (GPU/Video/Audio/Network)
        - intel-gmmlib
        - intel-mediasdk
        - intel-vaapi-driver
        - intel-vpl-gpu-rt
        - libva-intel-media-driver
        - intel-audio-firmware
        - intel-gpu-firmware
        - intel-vsc-firmware
        - iwlegacy-firmware
        - iwlwifi-dvm-firmware
        - iwlwifi-mld-firmware
        - iwlwifi-mvm-firmware

        # Other Hardware (Broadcom, MediaTek, Marvell, etc.)
        - brcmfmac-firmware
        - mt7xxx-firmware
        - nxpwireless-firmware
        - tiwilink-firmware
        - libertas-firmware
        - cirrus-audio-firmware
        - qcom-wwan-firmware

        # --- Language Engines & Input Methods (Fcitx5 Bloat) ---
        - fcitx5
        - fcitx5-chewing
        - fcitx5-chinese-addons
        - fcitx5-chinese-addons-data
        - fcitx5-configtool
        - fcitx5-data
        - fcitx5-gtk
        - fcitx5-gtk3
        - fcitx5-gtk4
        - fcitx5-hangul
        - fcitx5-libs
        - fcitx5-libthai
        - fcitx5-lua
        - fcitx5-m17n
        - fcitx5-mozc
        - fcitx5-qt6
        - fcitx5-qt-libfcitx5qt6widgets
        - fcitx5-qt-qt6gui
        - fcitx5-sayura
        - fcitx5-unikey
        - kcm-fcitx5
        - libime
        - libime-data
        - xcb-imdkit
        - kasumi-common
        - kasumi-unicode

        # --- Redundant Apps & Drivers ---
        # Printer Drivers (Keeping Epson, removing others)
        - hplip
        - hplip-common
        - hplip-libs
        - libsane-hpaio
        - printer-driver-brlaser
        - ptouch-driver
        - splix
        - gutenprint
        - gutenprint-cups
        - gutenprint-libs
        - dymo-cups-drivers

        # Multimedia Redundancy (Keeping GStreamer, removing VLC system backend)
        - phonon-backend-vlc-common
        - phonon-qt5-backend-vlc
        - phonon-qt6-backend-vlc
        - vlc-libs
        - vlc-plugins-base
        - vlc-plugins-video-out
        - vlc-plugin-ffmpeg
        - vlc-plugin-gstreamer
        - vlc-plugin-pipewire
        - vlc-plugin-pulseaudio

        # --- Virtualization Guest Agents (Bare Metal optimization) ---
        - open-vm-tools
        - open-vm-tools-desktop
        - qemu-guest-agent
        - virtualbox-guest-additions
        - hyperv-daemons
        - hyperv-daemons-license
        - hypervfcopyd
        - hypervkvpd
        - hypervvssd
