# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - "@virtualization"
        - gnome-boxes
        - virt-manager
        - virt-viewer
        - libvirt-daemon-config-network
        - libvirt-daemon-kvm

  - type: systemd
    system:
      enabled:
        - libvirtd.service
        - virtlogd.service
        - virtproxyd.service

  - type: files
    files:
      - source: scripts/setup-kvm.sh
        destination: /usr/bin/setup-kvm.sh

  - type: kargs
    kargs:
      - kvm_amd.npt=1
      - kvm_amd.nested=1
      - amd_iommu=on
      - iommu=pt
