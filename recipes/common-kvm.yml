# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - "@virtualization"
        - gnome-boxes
      exclude:
        - virt-viewer

  - type: systemd
    system:
      enabled:
        - libvirtd.service

  - type: kargs
    kargs:
      - amd_pstate=active
      - kvm_amd.npt=1
      - kvm_amd.nested=1
      - amd_iommu=on
      - iommu=pt
