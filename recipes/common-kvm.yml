---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

# Módulo genérico de virtualização — neutro quanto a hardware.
# Kargs específicos de AMD foram movidos para common-kvm-amd.yml.
# Kargs específicos de Intel devem ser criados em common-kvm-intel.yml.

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - "@virtualization"
        - gnome-boxes
      exclude:
        - virt-viewer

  - type: systemd
    system:
      enabled:
        - libvirtd.service

  - type: files
    files:
      - source: scripts/setup-kvm.sh
        destination: /usr/bin/setup-kvm.sh

  - type: kargs
    kargs:
      - kvm_amd.npt=1 # AMD KVM virtualization parameters (both variants use AMD CPU)
      - kvm_amd.nested=1
      - iommu=pt # Generic IOMMU passthrough
      - amd_iommu=on
