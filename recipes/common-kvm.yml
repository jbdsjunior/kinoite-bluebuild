---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - "@virtualization"
        - gnome-boxes
      exclude:
        - virt-viewer

  - type: systemd
    system:
      enabled:
        - libvirtd.service

  - type: files
    files:
      - source: scripts/setup-kvm.sh
        destination: /usr/bin/setup-kvm.sh

  - type: kargs
    kargs:
      # - kvm_amd.avic=1
      - kvm_amd.nested=1
      - iommu=pt # Generic IOMMU passthrough
