# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - lilay/topgrade
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - topgrade

  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - starship
        - fastfetch
        - distrobox
        - podman-compose
        - podman-docker
        - podman-machine
        - tailscale
        - git
        # - fuse
        # - fuse-libs
