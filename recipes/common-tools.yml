# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      cleanup: true
      copr:
        - atim/starship
        - lilay/topgrade
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - starship
        - topgrade

  - type: dnf
    install:
      skip-unavailable: true
      allow-erasing: true
      packages:
        - fastfetch
        - distrobox
        - git
        - podman-compose
        - podman-docker
        - podman-machine
        - slirp4netns # slirp4netns is no longer the default for rootless networking on new podman installations, obsoleted in favor of passt. If you have containers using slirp4netns, make sure slirp4netns is installed
        - fuse
        - fuse-libs
        - tailscale
