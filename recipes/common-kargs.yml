---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: kargs
    kargs:
      - transparent_hugepage=madvise # Transparent hugepages: defer for better memory allocation latency
      - pcie_aspm=policy_performance # PCIe ASPM: policy_performance for desktop/workstation stability
      - amd_iommu=on # AMD CPU IOMMU — both variants run on AMD CPU
