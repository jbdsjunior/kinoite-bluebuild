---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: kargs
    arch: x86_64
    kargs:
      # AMD CPU power management (AMD only, ignored on Intel)
      - amd_pstate=active
      # Transparent hugepages: defer for better memory allocation latency
      - transparent_hugepage=madvise
      # Security mitigations: auto (balanced security/performance)
      - mitigations=auto
      # PCIe ASPM: policy_performance for desktop/workstation stability
      - pcie_aspm=policy_performance
