---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: kargs
    arch: x86_64
    kargs:
      # Transparent hugepages: defer for better memory allocation latency
      - transparent_hugepage=madvise
      # Security mitigations: auto (balanced security/performance)
      - mitigations=auto
      # PCIe ASPM: policy_performance for desktop/workstation stability
      - pcie_aspm=policy_performance
      # Kernel memory allocator hardening (default in modern kernels, explicit for audit clarity)
      - init_on_alloc=1
      - init_on_free=1
      - slab_nomerge
