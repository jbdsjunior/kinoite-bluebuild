name: lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-yaml-lint:
    name: Shell and YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lint dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck yamllint

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck files/scripts/*.sh files/system/etc/profile.d/*.sh

      - name: Run yamllint
        run: |
          set -euo pipefail
          yamllint recipes/*.yml .github/workflows/*.yml
