name: check-updates
on:
  schedule:
    # Verifica atualizações da imagem base a cada 2 horas
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        flavor: [amd, nvidia]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends skopeo

      - name: Ensure gh auth
        run: gh auth status
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve base image (${{ matrix.flavor }})
        id: resolve
        run: |
          set -euo pipefail
          RECIPE_FILE="recipes/recipe-${{ matrix.flavor }}.yml"
          BASE_IMG=$(awk -F': ' '/^base-image:/ {print $2; exit}' "$RECIPE_FILE")

          if [[ -z "${BASE_IMG}" ]]; then
            echo "Failed to resolve base image from ${RECIPE_FILE}" >&2
            exit 1
          fi

          echo "image=${BASE_IMG}" >> "$GITHUB_OUTPUT"

      - name: Check base image digest (${{ matrix.flavor }})
        id: check
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect "docker://${{ steps.resolve.outputs.image }}" --format '{{.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Check cache (${{ matrix.flavor }})
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache-${{ matrix.flavor }}
          key: upstream-${{ matrix.flavor }}-${{ steps.check.outputs.digest }}

      - name: Trigger build (${{ matrix.flavor }})
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          gh workflow run "build-${{ matrix.flavor }}.yml" --ref main --repo "${{ github.repository }}"

          mkdir -p ~/.cache-${{ matrix.flavor }}
          echo "${{ steps.check.outputs.digest }}" > ~/.cache-${{ matrix.flavor }}/upstream-digest.txt
        env:
          GH_TOKEN: ${{ github.token }}
