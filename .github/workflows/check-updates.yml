name: check-updates
on:
  schedule:
    # Check for upstream base image updates every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get -y install skopeo

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Ensure gh auth
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # ── AMD ──────────────────────────────────────────────────────────
      - name: Resolve AMD base image
        id: amd_image
        run: |
          set -euo pipefail
          BASE_IMG=$(yq '.base-image' recipes/recipe-amd.yml)
          echo "image=${BASE_IMG}" >> "$GITHUB_OUTPUT"

      - name: Check AMD base image digest
        id: check_amd
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect docker://${{ steps.amd_image.outputs.image }} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Check AMD Cache
        id: cache_amd
        uses: actions/cache@v5
        with:
          path: ~/.cache-amd
          key: upstream-main-${{ steps.check_amd.outputs.digest }}

      - name: Trigger AMD Build
        if: steps.cache_amd.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          gh workflow run build-amd.yml --ref main --repo "${{ github.repository }}"
          mkdir -p ~/.cache-amd
          echo "${{ steps.check_amd.outputs.digest }}" > ~/.cache-amd/upstream-digest.txt
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # ── NVIDIA ───────────────────────────────────────────────────────
      - name: Resolve NVIDIA base image
        id: nvidia_image
        run: |
          set -euo pipefail
          BASE_IMG=$(yq '.base-image' recipes/recipe-nvidia.yml)
          echo "image=${BASE_IMG}" >> "$GITHUB_OUTPUT"

      - name: Check NVIDIA base image digest
        id: check_nvidia
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect docker://${{ steps.nvidia_image.outputs.image }} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Check Nvidia Cache
        id: cache_nvidia
        uses: actions/cache@v5
        with:
          path: ~/.cache-nvidia
          key: upstream-nvidia-${{ steps.check_nvidia.outputs.digest }}

      - name: Trigger Nvidia Build
        if: steps.cache_nvidia.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          gh workflow run build-nvidia.yml --ref main --repo "${{ github.repository }}"
          mkdir -p ~/.cache-nvidia
          echo "${{ steps.check_nvidia.outputs.digest }}" > ~/.cache-nvidia/upstream-digest.txt
        env:
          GITHUB_TOKEN: ${{ github.token }}
