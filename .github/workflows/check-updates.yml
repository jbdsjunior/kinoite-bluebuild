name: check-updates
on:
  schedule:
    # Verifica atualizações da imagem base a cada 2 horas
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write   # Necessário para usar o comando 'gh workflow run'
      contents: read   # Necessário para o checkout
    strategy:
      fail-fast: false # Se a verificação AMD falhar, a da NVIDIA ainda vai rodar
      matrix:
        flavor: [amd, nvidia] # Para adicionar mais, basta incluir aqui (ex: intel)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Passo de validação (opcional) apenas para garantir a saúde da Action
      - name: Ensure gh auth
        run: gh auth status
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve base image (${{ matrix.flavor }})
        id: resolve
        run: |
          set -euo pipefail
          BASE_IMG=$(yq '.base-image' recipes/recipe-${{ matrix.flavor }}.yml)
          echo "image=${BASE_IMG}" >> "$GITHUB_OUTPUT"

      - name: Check base image digest (${{ matrix.flavor }})
        id: check
        run: |
          set -euo pipefail
          DIGEST=$(skopeo inspect docker://${{ steps.resolve.outputs.image }} --format '{{.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Check Cache (${{ matrix.flavor }})
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache-${{ matrix.flavor }}
          key: upstream-${{ matrix.flavor }}-${{ steps.check.outputs.digest }}

      - name: Trigger Build (${{ matrix.flavor }})
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          # Dispara o workflow correspondente
          gh workflow run build-${{ matrix.flavor }}.yml --ref main --repo "${{ github.repository }}"

          # Cria os dados para que o actions/cache salve no final do job
          mkdir -p ~/.cache-${{ matrix.flavor }}
          echo "${{ steps.check.outputs.digest }}" > ~/.cache-${{ matrix.flavor }}/upstream-digest.txt
        env:
          GH_TOKEN: ${{ github.token }}