name: build-nvidia
on:
  workflow_dispatch:
concurrency:
  group: build-nvidia-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-nvidia:
    name: Build Custom NVIDIA Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        # with:
        #   fetch-depth: 0

      - name: Build Custom NVIDIA Image
        uses: blue-build/github-action@v1
        with:
          recipe: recipe-nvidia.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          verify_install: true
          maximize_build_space: true
          max_layers: 256
          use_cache: true
          retry_push_count: 3
          use_unstable_cli: false
          skip_checkout: true
          build_chunked_oci: false
