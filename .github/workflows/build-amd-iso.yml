name: build-amd-iso

on:
  workflow_run:
    workflows: ["build-amd"] # Dispara automaticamente após o build da imagem OCI
    types:
      - completed
  workflow_dispatch: # Permite execução manual

concurrency:
  group: build-iso-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan (nightly ISO)
    # Só executa se o build anterior foi sucesso ou se for manual
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  generate-nightly-iso:
    name: Generate nightly ISO (BlueBuild)
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: jasonn3/build-container-installer@v1.4.0
        with:
          arch: x86_64
          image_name: kinoite-amd
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 44
          iso_name: kinoite-amd-nightly.iso 
          secure_boot_key_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/cosign.pub"

      - name: Upload nightly ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kinoite-amd-nightly-iso
          path: |
            ./*.iso
            ./*.iso.CHECKSUM
          retention-days: 3 

      - name: Update Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Limpeza nativa da release e tag antiga
          gh release delete nightly --cleanup-tag --yes || true
          
          # Criação da nova release com link estável
          gh release create nightly ./*.iso ./*.iso.CHECKSUM \
            --title "Nightly Build - Fedora 44" \
            --notes "ISO gerada automaticamente a partir da imagem OCI estável mais recente (Fedora 44)." \
            --prerelease
