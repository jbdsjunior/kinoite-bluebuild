name: build-amd-iso

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan (nightly ISO)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Corrigido de v6 para v4

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  generate-nightly-iso:
    name: Generate nightly ISO (BlueBuild)
    needs: security-scan # Corrigido: dependência alterada para aguardar o gate de segurança
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Utiliza o método oficial recomendado pelo template do BlueBuild para geração de ISO OCI
      - name: Generate ISO
        uses: jasonn3/build-container-installer@v1.2.4
        with:
          arch: x86_64
          image_name: kinoite-amd
          image_repo: ghcr.io/jbdsjunior
          image_tag: latest
          version: 40 # Ajuste para 41 caso a imagem base do seu Fedora Kinoite seja a 41
          iso_name: kinoite-amd-nightly-live-${{ github.run_number }}.iso
          # Injeta a chave Cosign existente no seu projeto para permitir a validação do Secure Boot via MOK
          secure_boot_key_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/cosign.pub"

      - name: Upload nightly ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kinoite-amd-nightly-iso
          path: |
            ./*.iso
            ./*.iso.CHECKSUM
          retention-days: 14

      - name: Update Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Cria a tag/release se não existir, ou atualiza se já existir
          gh release delete nightly --yes || true
          git tag -d nightly || true
          git tag nightly
          git push origin nightly --force
          gh release create nightly ./*.iso ./*.iso.CHECKSUM --title "Nightly Build" --notes "Build gerada automaticamente em $(date)" --prerelease
