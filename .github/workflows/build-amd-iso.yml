name: build-amd-iso

on:
  schedule:
    - cron: "0 3 * * *" # Roda diariamente às 03:00 UTC
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan (nightly ISO)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  generate-nightly-iso:
    name: Generate nightly ISO (BlueBuild)
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write # OBRIGATÓRIO: Necessário para deletar/criar releases e tags
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: jasonn3/build-container-installer@main
        with:
          arch: x86_64
          image_name: kinoite-amd
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: latest
          iso_name: kinoite-amd-nightly.iso 
          secure_boot_key_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/cosign.pub"

      - name: Upload nightly ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kinoite-amd-nightly-iso
          path: |
            ./*.iso
            ./*.iso.CHECKSUM
          # Retenção reduzida para poupar espaço, já que a ISO estará na Release
          retention-days: 3 

      - name: Update Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Tenta deletar a release antiga e a tag correspondente de forma nativa via CLI
          gh release delete nightly --cleanup-tag --yes || true
          
          # 2. Cria a nova release apontando para o commit atual com os arquivos gerados
          gh release create nightly ./*.iso ./*.iso.CHECKSUM \
            --title "Nightly Build ($(date +'%Y-%m-%d'))" \
            --notes "Build ISO gerada automaticamente a partir da imagem OCI mais recente." \
            --prerelease
