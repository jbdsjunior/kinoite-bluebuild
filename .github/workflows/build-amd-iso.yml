name: build-amd-iso

on:
  workflow_run:
    workflows: ["build-amd"] # Dispara automaticamente após a imagem OCI estar pronta
    types:
      - completed
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan (nightly ISO)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  generate-nightly-iso:
    name: Generate nightly ISO
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write # Necessário para gerenciar Releases
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: jasonn3/build-container-installer@main
        id: build # OBRIGATÓRIO: Permite referenciar os outputs gerados nos próximos passos
        with:
          arch: x86_64
          image_name: kinoite-amd
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 44 # Utilize 44 para o instalador buscar os pacotes do Fedora 44
          iso_name: kinoite-amd-nightly.iso 
          secure_boot_key_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/cosign.pub"

      - name: Upload nightly ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          retention-days: 3
          if-no-files-found: error

      - name: Update Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Remove a release anterior e a tag
          gh release delete nightly --cleanup-tag --yes || true
          
          # Cria a release utilizando exatamente os outputs dinâmicos da action
          gh release create nightly \
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }} \
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM \
            --title "Nightly Build - Fedora 44" \
            --notes "ISO gerada automaticamente. Base: Fedora Kinoite 44." \
            --prerelease
