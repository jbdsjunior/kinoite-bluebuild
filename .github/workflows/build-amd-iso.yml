name: build-amd-iso

on:
  workflow_run:
    workflows: ["build-amd"] # Dispara automaticamente após a imagem OCI estar pronta
    types:
      - completed
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan (nightly ISO)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  generate-nightly-iso:
    name: Generate nightly ISO
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write 
      packages: read
    
    # Gestão Estruturada de Dados: Variáveis centralizadas
    env:
      IMAGE_NAME: kinoite-amd
      IMAGE_TAG: latest
      VERSION: 44
      VARIANT: Kinoite # Define explicitamente a variante do instalador Anaconda

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Generate ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build # Identificador necessário para recolher outputs
        with:
          arch: x86_64
          image_name: ${{ env.IMAGE_NAME }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: ${{ env.IMAGE_TAG }}
          version: ${{ env.VERSION }}
          variant: ${{ env.VARIANT }}
          iso_name: ${{ env.IMAGE_NAME }}-nightly.iso 
          secure_boot_key_url: "https://raw.githubusercontent.com/${{ github.repository }}/main/cosign.pub"

      - name: Upload nightly ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          retention-days: 3
          if-no-files-found: error

      - name: Update Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --cleanup-tag --yes || true
          
          # Utiliza diretamente os outputs oficiais para anexar os ficheiros
          gh release create nightly \
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }} \
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM \
            --title "Nightly Build - Fedora ${{ env.VERSION }}" \
            --notes "ISO gerada automaticamente. Base: Fedora ${{ env.VARIANT }} ${{ env.VERSION }}." \
            --prerelease
